# Netlify configuration — Arsenal Map (static single-page site)
# No build step: index.html is served from the repo root.

[build]
  publish = "."
  command = ""

# index.html is the entry point; Netlify serves it at "/" automatically.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# The page is self-contained HTML/CSS/JS — safe to cache briefly at the edge.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
